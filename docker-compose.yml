version: '3.8'
volumes:
  es-data:
  db-data:

services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: eunomia_keycloak
    # `--import-realm` makes Keycloak load any /opt/keycloak/data/import/*.json
    # at startup. Idempotent: re-importing on an existing realm is a no-op by
    # default. To force a re-import of dev data, run `docker-compose down -v`
    # to wipe the dev-file DB, then `up -d keycloak` again.
    command: start-dev --import-realm
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Pin the externally-advertised hostname so JWT `iss` is stable across
      # reachers (host shell, OM container, middleware) → all see iss=http://localhost:8080.
      # KC_HOSTNAME_STRICT=false lets server-to-server traffic via the docker
      # service name (`http://eunomia_keycloak:8080`) still work for JWKS fetch.
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      JAVA_OPTS_APPEND: -Xms1024m -Xmx1024m
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /realms/eunomia/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mysql:
    container_name: openmetadata_mysql
    image: docker.getcollate.io/openmetadata/db:1.12.6
    command: "--sort_buffer_size=10M"
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
    expose:
      - 3306
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app_net
    healthcheck:
      test: mysql --user=root --password=$$MYSQL_ROOT_PASSWORD --silent --execute "use openmetadata_db"
      interval: 15s
      timeout: 10s
      retries: 10

  elasticsearch:
    container_name: openmetadata_elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - app_net
    ports:
      - "9200:9200"
    healthcheck:
      test: "curl -s http://localhost:9200/_cluster/health?pretty | grep status | grep -qE 'green|yellow' || exit 1"
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - es-data:/usr/share/elasticsearch/data

  execute-migrate-all:
    container_name: execute_migrate_all
    image: docker.getcollate.io/openmetadata/server:1.12.6
    command: "./bootstrap/openmetadata-ops.sh migrate"
    environment:
      OPENMETADATA_CLUSTER_NAME: openmetadata
      SERVER_PORT: 8585
      SERVER_ADMIN_PORT: 8586
      LOG_LEVEL: INFO
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: openmetadata_user
      DB_USER_PASSWORD: openmetadata_password
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      PIPELINE_SERVICE_CLIENT_ENABLED: "false"
      # Heap OPTS Configurations
      OPENMETADATA_HEAP_OPTS: -Xmx2g -Xms1g -XX:+UseG1GC
    depends_on:
      elasticsearch:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - app_net

  openmetadata-server:
    container_name: openmetadata_server
    restart: always
    image: docker.getcollate.io/openmetadata/server:1.12.6
    env_file:
      # OIDC / multi-auth wiring (Keycloak). See ./openmetadata/env.openmetadata.
      - ./openmetadata/env.openmetadata
    environment:
      OPENMETADATA_CLUSTER_NAME: openmetadata
      SERVER_PORT: 8585
      SERVER_ADMIN_PORT: 8586
      LOG_LEVEL: INFO
      AUTHORIZER_CLASS_NAME: org.openmetadata.service.security.DefaultAuthorizer
      # AUTHENTICATION_PROVIDER now comes from env_file (= "multi"). Do NOT
      # set it inline — `environment:` overrides `env_file:` in compose.
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: openmetadata_user
      DB_USER_PASSWORD: openmetadata_password
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      PIPELINE_SERVICE_CLIENT_ENABLED: "false"
      # Heap OPTS Configurations
      OPENMETADATA_HEAP_OPTS: -Xmx256M -Xms256M
    expose:
      - 8585
    ports:
      - "8585:8585"
    depends_on:
      elasticsearch:
        condition: service_healthy
      mysql:
        condition: service_healthy
      execute-migrate-all:
        condition: service_completed_successfully
    networks:
      - app_net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8586/healthcheck" ]

networks:
  app_net:
    ipam:
      driver: default
      config:
        - subnet: "172.16.240.0/24"
